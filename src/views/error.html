<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - HelpDesk Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:40px 20px">
        <div style="text-align:center;max-width:500px">
            <div style="font-size:80px;margin-bottom:24px">
                {{#if title}}
                {{#if title}}⚠️{{/if}}
                {{/if}}
            </div>
            <h1 style="font-size:28px;font-weight:800;margin-bottom:12px;color:var(--text)">{{title}}</h1>
            <p style="color:var(--text-muted);font-size:16px;margin-bottom:32px">{{message}}</p>
            <div class="d-flex gap-sm" style="justify-content:center">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver
                </a>
                {{#if user}}
                <a href="{{#if isAgent}}/dashboard{{else}}/mis-tickets{{/if}}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Inicio
                </a>
                {{else}}
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-house"></i> Inicio
                </a>
                {{/if}}
            </div>
        </div>
    </div>
</body>

</html>
