<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - Ayuda Valenzuela &amp; Delarze</title>
  <meta name="description" content="Sistema de Mesa de Ayuda Profesional">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-text">
          <div class="logo-icon">🎫</div>
          <div>
            Ayuda
            <span class="logo-sub">Valenzuela &amp; Delarze</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- El menú se construye dinámicamente según el rol -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="avatarInitials"></div>
          <div style="min-width:0">
            <div class="user-name truncate" id="userName">{{user.name}}</div>
            <div class="user-role" id="userRole">{{user.role}}</div>
          </div>
          <a href="/auth/logout" class="user-logout" title="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i>
          </a>
        </div>
      </div>
    </aside>

    <!-- OVERLAY MOBILE -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- MAIN -->
    <div class="main-content">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menú">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="topbar-title">{{title}}</h1>
        <div class="topbar-actions">
          <a href="/mis-tickets/nuevo" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i> Nuevo Ticket
          </a>
        </div>
      </header>

      <main class="page-content animate-fade">
        {{body}}
      </main>
    </div>
  </div>

  <script>
    // ─── Datos del usuario pasados desde el servidor ─────────────
    var _USER_ROLE = "{{user.role}}";
    var _USER_NAME = "{{user.name}}";
    var _CURRENT_PATH = window.location.pathname;

    // ─── Iniciales del avatar ─────────────────────────────────────
    (function () {
      var name = _USER_NAME || "?";
      var initials = name.split(" ").map(function (w) { return w[0]; }).slice(0, 2).join("").toUpperCase();
      var el = document.getElementById("avatarInitials");
      if (el) el.textContent = initials;
      var nameEl = document.getElementById("userName");
      if (nameEl) nameEl.textContent = name;
      var roleEl = document.getElementById("userRole");
      if (roleEl) {
        var roleMap = { admin: "Administrador", agent: "Agente / Técnico", user: "Usuario" };
        roleEl.textContent = roleMap[_USER_ROLE] || _USER_ROLE;
      }
    })();

    // ─── Construir menú del sidebar según el rol ──────────────────
    (function buildNav() {
      var nav = document.getElementById("sidebarNav");
      if (!nav) return;

      var isAdmin = _USER_ROLE === "admin";
      var isAgent = _USER_ROLE === "admin" || _USER_ROLE === "agent";

      function link(href, icon, label, extra) {
        var active = _CURRENT_PATH === href || _CURRENT_PATH.startsWith(href + "/") ? "active" : "";
        return '<div class="nav-item"><a href="' + href + '" class="nav-link ' + active + '">' +
          '<span class="icon"><i class="bi bi-' + icon + '"></i></span> ' + label +
          (extra || "") + '</a></div>';
      }
      function section(label) {
        return '<div class="nav-section">' + label + '</div>';
      }

      var html = "";

      if (isAgent) {
        html += section("Principal");
        html += link("/dashboard", "speedometer2", "Dashboard");
        html += link("/admin/tickets", "ticket-perforated", "Todos los Tickets");

        html += section("Gestión");
        html += link("/admin/reportes", "bar-chart-line", "Reportes");

        if (isAdmin) {
          html += link("/admin/usuarios", "people", "Usuarios");
          html += link("/admin/configuracion", "gear", "Configuración");
          html += link("/admin/auditoria", "shield-check", "Auditoría");
        }

        html += section("Mi Cuenta");
        html += link("/mis-tickets", "person-check", "Mis Tickets");
        html += link("/mis-tickets/nuevo", "plus-circle", "Nuevo Ticket");
      } else {
        html += section("Mi Portal");
        html += link("/mis-tickets", "ticket-perforated", "Mis Tickets");
        html += link("/mis-tickets/nuevo", "plus-circle", "Nuevo Ticket");
      }

      nav.innerHTML = html;
    })();
  </script>
  <script src="/js/app.js"></script>
</body>

</html>
