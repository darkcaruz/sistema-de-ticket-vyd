<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - HelpDesk Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-right" style="max-width:520px">
            <div class="auth-logo">
                <div class="auth-logo-icon">🎫</div>
                <div>
                    <div class="auth-logo-text">HelpDesk Pro</div>
                    <span class="auth-logo-sub">Crear nueva cuenta</span>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Crear cuenta</h2>
                    <p class="text-muted text-sm" style="margin-bottom:24px">Completa los datos para registrarte</p>

                    {{#if error}}
                    <div class="alert alert-error">
                        <i class="bi bi-exclamation-triangle-fill"></i> {{error}}
                    </div>
                    {{/if}}

                    <form method="POST" action="/auth/register">
                        <div class="form-group">
                            <label class="form-label" for="name">Nombre completo <span class="required">*</span></label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Juan Pérez"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="email">Correo electrónico <span
                                    class="required">*</span></label>
                            <input type="email" id="email" name="email" class="form-control"
                                placeholder="juan@empresa.com" required>
                        </div>
                        <div class="form-row cols-2">
                            <div class="form-group">
                                <label class="form-label" for="password">Contraseña <span
                                        class="required">*</span></label>
                                <input type="password" id="password" name="password" class="form-control"
                                    placeholder="Mínimo 6 caracteres" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="password2">Confirmar contraseña <span
                                        class="required">*</span></label>
                                <input type="password" id="password2" name="password2" class="form-control"
                                    placeholder="Repite tu contraseña" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-full" style="padding:11px;margin-top:4px">
                            <i class="bi bi-person-check"></i> Crear Cuenta
                        </button>
                    </form>

                    <div class="auth-divider" style="margin-top:20px">
                        ¿Ya tienes cuenta? <a href="/auth/login">Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
